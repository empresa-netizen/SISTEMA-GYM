# Nginx — plataforma.mgteamoficial.site
# Ajuste root/path/PHP-FPM socket conforme a VPS / Hostinger.
# Após DNS apontar: certbot --nginx -d plataforma.mgteamoficial.site

server {
    listen 80;
    listen [::]:80;
    server_name plataforma.mgteamoficial.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name plataforma.mgteamoficial.site;

    # SSL gerenciado pelo Certbot / painel Hostinger
    # ssl_certificate     /etc/letsencrypt/live/plataforma.mgteamoficial.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/plataforma.mgteamoficial.site/privkey.pem;

    root /var/www/plataforma.mgteamoficial.site/public;
    index index.php;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    charset utf-8;
    client_max_body_size 32M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # Hostinger / Ubuntu tipico:
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
