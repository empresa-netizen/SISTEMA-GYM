# Stack mobile MGTEAM — rode com: ./scripts/mobile-up.sh
services:
  mobile-db:
    image: postgres:16-alpine
    container_name: mgteam_mobile_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trabalho
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: coachpro
    ports:
      - "5433:5432"
    volumes:
      - mgteam_mobile_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trabalho -d coachpro"]
      interval: 5s
      timeout: 5s
      retries: 20

  # LEGADO: Express+Postgres desligado por padrão.
  # Apps agora usam Laravel :8000 (MySQL). Suba só se precisar comparar:
  #   docker compose -f docker-compose.mobile.yml --profile legacy-api up -d mobile-api
  mobile-api:
    profiles: ["legacy-api"]
    image: node:22-bookworm
    container_name: mgteam_mobile_api
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8088:8088"
    environment:
      NODE_ENV: development
      PORT: 8088
      JWT_SECRET: mgteam-mobile-jwt-secret-dev-only
      DATABASE_URL: postgresql://trabalho:123456@mobile-db:5432/coachpro?schema=public
      DIRECT_DATABASE_URL: postgresql://trabalho:123456@mobile-db:5432/coachpro?schema=public
    volumes:
      - ../../../CLAUDE/mgteam-api:/app
      - mgteam_mobile_api_nm:/app/node_modules
    depends_on:
      mobile-db:
        condition: service_healthy
    command: >
      sh -c "
        apt-get update -qq && apt-get install -y -qq openssl ca-certificates >/dev/null &&
        if [ ! -f node_modules/.installed ]; then npm ci && touch node_modules/.installed; fi &&
        npx prisma generate &&
        npx tsx watch src/index.ts
      "

  mobile-aluno:
    image: node:22-bookworm
    container_name: mgteam_mobile_aluno
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8086:8086"
    environment:
      # Fonte única: Laravel MySQL API (compat mobile) — não usa mais Postgres :8088
      EXPO_PUBLIC_API_URL: http://localhost:8000
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      CI: "1"
    volumes:
      - ../../../CLAUDE/mgteam-app:/app
      - mgteam_mobile_aluno_nm:/app/node_modules
    depends_on:
      - mobile-db
    command: >
      sh -c "
        if [ ! -f node_modules/.installed ]; then npm install --legacy-peer-deps && touch node_modules/.installed; fi &&
        npx expo start --web --host lan --port 8086
      "

  mobile-pro:
    image: node:22-bookworm
    container_name: mgteam_mobile_pro
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8089:8089"
    environment:
      # Fonte única: Laravel MySQL API (compat mobile) — não usa mais Postgres :8088
      EXPO_PUBLIC_API_URL: http://localhost:8000
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      CI: "1"
    volumes:
      - ../../../CLAUDE/mgteam-pro-app:/app
      - mgteam_mobile_pro_nm:/app/node_modules
    depends_on:
      - mobile-db
    command: >
      sh -c "
        if [ ! -f node_modules/.installed ]; then npm install --legacy-peer-deps && touch node_modules/.installed; fi &&
        npx expo start --web --host lan --port 8089
      "

volumes:
  mgteam_mobile_pgdata:
  mgteam_mobile_api_nm:
  mgteam_mobile_aluno_nm:
  mgteam_mobile_pro_nm:
