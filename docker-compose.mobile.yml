# Stack mobile MGTEAM — App do Aluno
# Rode com: ./scripts/mobile-up.sh
services:
  mobile-aluno:
    image: node:22-bookworm
    container_name: mgteam_mobile_aluno
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8086:8086"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      CI: "1"
    volumes:
      - ./student-app:/app
      - mgteam_mobile_aluno_nm:/app/node_modules
    command: >
      sh -c "
        if [ ! -f node_modules/.installed ]; then npm install --legacy-peer-deps && touch node_modules/.installed; fi &&
        npx expo start --web --host lan --port 8086
      "

volumes:
  mgteam_mobile_aluno_nm:
